# /etc/nginx/sites-available/trading-dashboard
# Symlink to sites-enabled: ln -s /etc/nginx/sites-available/trading-dashboard /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;          # matches any hostname / bare IP

    # Basic auth — protects dashboard from public internet
    auth_basic           "Trading Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Proxy to dashboard.py
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Logs
    access_log /var/log/nginx/trading_access.log;
    error_log  /var/log/nginx/trading_error.log;
}
